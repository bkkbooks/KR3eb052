body:
  text: 下卷方略凡病皆標也而必有其本本者所以致病之根源也蓋惟人之病也有一標必有一致標之本是以醫之治也有一本必有一拔本之方不獲乎致標之本處方必不能對其症也不投以對症之方治病必不能拔其本也臨症者欲決群醫莫決之疑則內因外因致病須審其原欲中各症必中之的則正治從治驗方務求其諦用輯主症諸方以列驗舌之次凡舌見青色而堅斂蒼老者肝膽兩經邪氣盛也瀉火清肝飲主之瀉火清肝飲方柴胡酒炒黃芩酒炒山梔酒炒各一錢生地酒浸三錢當歸酒洗二錢生甘草一錢按上方主治肝膽兩經實邪以致脅痛耳聾膽溢口苦筋痿陰汗陰腫陰痛白濁溲血等症凡舌見青色而浮胖嬌嫩者肝膽兩經精氣虛也滋水生肝飲主之滋水生肝飲方熟地四錢山藥二錢萸肉二錢丹皮錢半茯苓錢半澤瀉錢半五味一錢歸身錢半柴胡一錢甘草一錢白朮二錢半上方主治小便淋漓不利婦女月經不調兩脅脹悶少腹作痛寒熱往來胸乳作痛左關弦洪右關弦數此鬱怒傷肝脾血虛氣滯為患也用六味雙對減半分兩加柴胡白朮甘草當歸五味合逍遙而去白芍加五味者合都氣意也以生肝故去白芍而留白朮甘草以補脾補脾者生金以制木也以製為生天地自然之理也凡舌見青色而乾燥屬膽腑陰虛火鬱者用逍遙散加生地薄荷主之逍遙散加生地薄荷方柴胡酒炒五分白芍酒炒一錢歸身酒洗一錢半白朮一錢半茯苓一錢甘草五分生地二錢薄荷五分凡舌見青色而乾燥屬肝臟血虛火旺者逍遙散加丹皮山梔主之逍遙散加丹皮山梔方柴胡一錢白芍二錢當歸三錢白朮二錢半茯苓一錢半甘草一錢丹皮一錢半山梔一錢半按上原方主治肝膽兩經鬱火以致脅痛頭眩或胃脘當心而痛或肩胛絆痛或兩目赤痛連及太陽以上各症皆肝火上衝也及六經感症凡見陽脈者悉宜此方治之婦女鬱怒傷肝致血妄行赤白淫閉沙淋崩濁等症以上各症皆肝火下流也俱宜此方加減易曰風以散之此方是也凡舌見青色而潤滑屬膽腑氣怯十味溫膽湯去枳實主之十味溫膽湯去枳實方陳皮二錢去白半夏二錢薑製茯苓一錢半棗仁錢半炒研遠志五分去心人參五分熟地二錢竹茹一錢甘草五分生薑一錢大棗三枚酒煎按上方主治心虛膽怯氣鬱生涎涎與氣搏變生諸症觸事易驚或夢寐不祥或短氣悸怖或自汗虛煩口苦嘔涎痰盛不眠及夢遺驚惕等症凡舌見青色而滑潤屬肝臟氣虛者當歸建中湯去膠飴主之當歸建中湯去膠飴方白芍三錢當歸二錢肉桂一錢甘草一錢按上方主治肝臟氣虛不能生火以致火不生土白芍之酸甘草之甘此係甲己化土也肉桂補肝之子益土之母所以培生化之原也凡脾味不和飲食不進其外見症兩脅寒痛大便泄利少腹墜痛並宜此方治之再按此小建中湯原方主治也千金方加當歸名當歸建中治婦人産後虛羸不足腹中痛引腰背小腹拘急今恐甜多入脾而去膠飴則當歸建中尤與肝臟氣虛切合矣凡舌見青色乾燥而形色反見胖嫩者肝膽氣血兩虛也七味飲倍肉桂主之七味飲倍肉桂方熟地八錢山藥四錢淨萸肉四錢丹皮三錢茯苓三錢澤瀉二錢肉桂二錢按上方主治肝膽氣虛筋無所養變為寒症以致筋骨疼痛腳軟懶行及傷寒服涼藥過多木中無火手足牽引肝經血虛以致火燥筋攣變為結核瘰癧等症經曰辛以潤之此方是也凡舌見青色滑潤而形色又兼胖嫩者肝膽木氣虛寒也養榮湯倍肉桂主之養榮湯倍肉桂方白芍三錢當歸二錢遠志一錢五味錢半肉桂一錢熟地四錢陳皮一錢半白朮三錢米泔水浸蒸黃耆三錢蜜炙無參倍用人參多少隨宜茯苓一錢半炙草一錢半煨姜一錢半大棗五枚按上方主治凡屬大虛症勿論其脈與症但服此方諸症悉退此十全大補湯對子也但十全大補只分氣血此則五臟皆補無虛不到虛而寒甚者當加附子以治之三陰虛更妙後凡用本方加減者主治並同凡舌見黃色而堅斂蒼老者脾胃兩經邪氣盛也瀉黃散主之瀉黃散方防風四兩藿香七錢山梔炒黑一兩石膏五錢甘草二兩微炒為末甜酒調服按上方主治脾胃伏火口燥唇乾口瘡口臭煩渴易飢熱在肌肉者凡舌見黃色而浮胖嬌嫩者脾胃兩經精氣虛也益黃散主之益黃散方陳皮一兩青皮五錢訶子五錢泡去皮丁香二錢白朮二兩甘草炙五錢按上方主治脾胃虛寒寒水反來侮土而嘔吐不食或肚腹作痛或大便不實手足逆冷等症炒磨為末每服四錢水煎服凡舌見黃色而乾燥屬胃腑陰虧火旺者左歸飲去茯苓加花粉歸地主之左歸飲去茯苓加花粉歸地方熟地八錢枸杞六錢山藥四錢萸肉四錢甘草二錢當歸三錢生地三錢花粉一錢火不甚者去之按上方主治腎水乾枯虛火上蒸脾胃陰土受虧以致飲食不進大便燥結甚至三陽癃閉將成噎隔及早服此無不愈也傷寒舌黑唇焦大渴引飲此必服發散寒涼攻伐之藥過多也原方加歸芍救之燥症更妙凡舌見黃色而乾燥屬脾臟血虛火盛者歸脾湯去木香加白芍丹皮山梔主之歸脾湯去木香加丹皮山梔方棗仁一錢炒研茯神一錢去木遠志一錢去心歸身一錢人參一錢半炙耆三錢無參倍之白朮二錢半米泔淨蒸尤圓七枚去殼甘草一錢炙白芍二錢丹皮錢半山梔錢半炒黑煨姜一錢大棗三枚按上方主治思慮傷心脾鬱怒傷肝以致三經血少而燥漸至心口有塊如拳或左肋下有塊如手掌或右肋下有塊如鐮刀且時作痛及健忘怔忡驚悸不寐等症內經所謂二陽之病發心脾在男子則隱曲不利在女子則月事不來其傳為風消其傳為息賁者不治正此症也凡舌見黃色而滑潤屬胃氣虛弱者七味白朮散加半夏主之七味白朮散加半夏方乾葛二錢木香五分藿香一錢人參錢半白朮二錢半茯苓錢半甘草一錢炙半夏一錢半大棗三枚煨姜一錢按上方主治脾虛肌熱泄瀉虛熱作渴如去乾葛木香藿香加陳皮則治脾胃氣虛飲食不進致成痰癖不能咳唾或胃氣虛寒動成嘔惡凡虛及諸病後皆可以此調之凡舌見黃色而滑潤屬脾氣虧損者五味異功散加白芍主之五味異功散加白芍方陳皮一錢人參一錢白朮二錢半茯苓一錢炙草一錢白朮一錢酒炒煨姜一錢大棗三枚去核按上方主治脾胃不和飲食不進泄利虛飽凡舌見黃色乾燥而形質反見胖嫩者脾胃氣血兩虛也參耆八珍湯主之參耆八珍湯方人參錢半茯苓錢半炙草錢半白朮二錢半米泔洗蒸土炒川芎一錢當歸三錢白芍二錢酒炒熟地四錢煨姜錢半大棗五枚按上方主治心脾肺胃氣血俱虛以致惡寒發熱嘈雜健忘怔忡不寐懈怠不臥四肢酸倦等症凡舌見黃色滑潤而形質又兼胖嫩者脾胃中氣虛寒也薑桂養榮湯主之薑桂養榮湯方白芍三錢酒炒遠志一錢去心當歸二錢酒洗五味錢半熟地四錢肉桂一錢白朮三錢陳皮錢半人參多少隨宜黃耆五錢蜜炙茯苓錢半炙草錢半炮姜錢半大棗五枚按上方主治已悉肝膽病本方條下凡舌見紅色而堅斂蒼老者心與小腸邪氣盛也瀉心湯主之瀉心湯方川連一錢黃芩一錢生地三錢山梔錢半丹皮錢半木通一錢甘草一錢按上方主治心火熾炎口苦舌瘡小腸鬱結不能通利等症凡舌見赤色而浮胖嬌嫩者心與小腸精氣虛也養心湯主之養心湯方茯神二錢遠志五分棗仁五分炒研柏子仁五分去油五味五分人參五分黃耆二錢炙當歸二錢川芎二錢半夏二錢肉桂五分甘草五分按上方主治心虛血少神氣不寧怔忡驚悸等症凡舌見赤色乾燥而屬小腸陰虛火旺者滋水清肝飲去柴胡加生地木通主之滋水清肝飲去柴胡加生地木通方熟地四兩山藥二錢萸肉二錢丹皮錢半茯苓錢半澤瀉錢半棗仁一錢白芍二錢山梔錢半當歸二錢生地三錢木通錢半按上原方主治腎水不足肝火上炎以致吞酸吐酸脅痛頭眩口苦咽乾大便艱澀小水短赤等症蓋取地黃丸之探原而不隔於中取生地黃湯之降火而不犯於下真從來所未及也凡舌見赤色而乾燥屬心臟血虛火盛者濟生歸脾湯去木香加丹皮麥冬主之濟生歸脾湯去木香加丹皮麥冬方茯神一錢遠志一錢棗仁一錢當歸錢半煨姜一錢人參一錢黃耆二錢半冬朮錢半龍圓五枚去殼丹皮錢半麥冬一錢甘草一錢大棗五個按上原方主治心衰火盛不能生土以致土困金敗外兼咳嗽吐痰寒熱往來盜汗等症悉以此方治之凡見脾胃衰弱飲食少思大便泄瀉總屬心氣不旺所致此補本法也凡各種虛症補中益氣湯所不效者投以此方加五味白芍以斂其心氣奏效更神也又按補中陽藥也歸脾陰藥也凡因飢飽勞役傷其脾而氣虛者宜用補中補中者補中以益其氣也因思慮鬱結傷其脾而血虛者宜用歸脾歸脾者噓血以歸於脾也至於心力俱勞而氣血俱傷者則補中歸脾單服固非對症合用又不成方惟有養榮一方可合補中歸脾兩症而統治之不致拈一放一耳凡舌見赤色而滑潤屬小腸陽氣虛墜者補中益氣湯加山梔川烏主之補中益氣湯加山梔川烏方升麻五分柴胡五分當歸二錢陳皮一錢人參一錢白朮錢半炙草一錢黃耆二錢半炙山梔一錢川烏一錢煨姜一錢大棗三枚按上原方主治凡六經內傷外感內傷外感者言由內傷以致外感也蓋以邪之所湊其氣必虛東垣故立此方以補傷寒書之所未及非補虛方也今感症家多不敢用而以為調理補虛服食之藥則謬矣調理補虛及通其意而轉用者耳及暑月勞倦發熱暑則氣耗勞則氣傷發熱而在於暑月且因勞倦自非甘溫不能彼肆用藿香滑石等為暑月發熱必需之劑只在不明此義耳或汗出不止衛外之陽虛則腠理不固矣俱用本方加白芍一錢須再加五味乃合肺主皮毛之義痢疾腹痛已除瀉猶未已是胃氣下陷也必尚兼後重第圊後隨減耳加酒炒白芍三錢瘧疾發久形體尪羸無論六經皆當加半夏一錢合六君也即有外感不過加黃芩一錢則合小柴胡矣凡婦女胎前氣虛以致胎動不安小産崩漏皆因氣虛不能升舉故也或産後血虛發熱凡血虛發熱者其舌必乾氣虛發熱者其舌必滑然既在産後則不但血虛即其氣未有不虛者蓋當其臨盆之際為産婦者若非全副精神渾身力氣努力責以推送之則胞胎如何下地逮至胞胎下地則所去之血固多之後能不傷其氣乎況血虛則氣無所附寧不與之俱虛乎茲以産後發熱專責血虛殊有漏義而症乃列於本方之下是知有形之血不能速生無形之氣所當急固陽旺陰生其意固自包舉也第不明言其意則産後之血虛人習聞之而産後之氣虛人皆忽之故特表而出之俱加酒炒白芍二錢氣味酸寒恐伐生氣故用酒炒此方凡屬中宮虛損病後調攝無不相宜倪氏曰七情內傷脾胃先病治先補土此方主之然內傷脾胃須有分別如飢飽勞役飲食生冷內傷脾胃而病者自當主以此方若由思慮鬱怒七情內傷而脾胃先病者則於本方尚隔一膜不若歸脾為的當也凡舌見赤色而滑潤屬心臟陽虛氣弱者濟生歸脾湯加丹皮肉桂主之噓血歸脾湯加丹皮肉桂方茯神一錢遠志一錢去心棗仁一錢炒研當歸錢半人參錢半黃耆三錢炙白朮二錢土炒木香五分炙草一錢丹皮一錢肉桂五分龍圓五枚去殼大棗三枚煨姜一錢按上原方主治已見本臟血虛條下凡舌見赤色乾燥而形質反見胖嫩者心與小腸氣血兩虛也棗仁養榮湯主之棗仁養榮湯方棗仁一錢炒研遠志一錢去心白芍錢半酒炒歸身一錢五味八分熟地二錢肉桂五分陳皮八分白朮錢半土炒人參錢半黃耆三錢炙茯神一錢炙草一錢煨姜一錢紅棗三枚按上方主治詳前本方凡舌見赤色滑潤而形質反見胖嫩者心與小腸火氣大虧也附子養榮湯主之附子養榮湯方附子一錢制白芍錢半遠志五分去心歸身一錢五味八分熟地二錢肉桂五分陳皮八分人參錢半黃耆三錢炙白朮二錢半土炒茯神一錢甘草一錢炙煨姜一錢紅棗三枚按上方主治並詳各臟腑病所列本方下而其分兩則獨輕於各臟腑而只與肺同者蓋心肺位近宜制小其服肝腎位遠宜制大其服也凡舌見白色而堅斂蒼老者肺與大腸邪氣盛也瀉白散主之瀉白散方桑白皮二錢蜜炙地骨皮二錢甘草一錢按上方主治凡屬肺熱咳嗽皆當加減用之嗽加桔梗百合痰加貝母如面赤咳嗽屬心火刑金者加人參茯苓青皮陳皮五味麥冬知母為人參平肺散以瀉金中之賊邪如咳嗽而鼻塞身重者風寒傷肺也參蘇飲或金沸草散以散之凡舌見白色而浮胖嬌嫩者肺與大腸精氣虛也補肺湯主之補肺湯方人參一錢黃耆一錢炙五味一錢熟地二錢紫菀一錢桑皮一錢蜜炙水煎入蜜少許和服按上方主治肺金氣虛不能生水以致水不制火虛陽上炎而生咳嗽等症凡舌見白色而乾燥屬大腸血虛火盛者潤腸滋水飲加生地當歸主之潤腸滋水飲加生地當歸方熟地四錢或八錢山藥二錢萸肉二錢枸杞四錢歸身三錢生地三錢蓯蓉三錢酒洗甘草一錢按上方主治大腸無血大便燥結其應甚捷凡舌見白色而乾燥屬肺臟火旺者生金滋水飲加柴胡黃芩主之生金滋水飲加柴芩方熟地四錢白芍二錢當歸二錢丹皮錢半麥冬錢半糯米拌炒人參一錢半白朮二錢半土炒甘草一錢炙柴胡一錢黃芩一錢按上原方主治凡傷寒熱退後有難補之陰有易動之陽皆當養之此以其見症或汗後煩燥未除口乾微熱大便艱澀小水短赤即是又有一種少陽陽明症手足腫痛系火燥生風風淫末疾不必俟其汗後當即以本方加柴芩與之無不效也凡舌見白色而滑潤屬大腸陽虛氣湯者補中益氣湯送固腸散主之補中益氣湯見前固腸散方陳米二兩炒熟木香一錢肉果二錢生用粟殼二錢密炙乾薑二錢半炒炙草一錢半按上方主治脾胃虛弱內寒注泄水穀不分下痢膿血赤少白多脹滿腹痛連心食少力乏等症炒磨為末每服二三錢煎補中送下切忌酒肉魚腥油麵生冷凡舌見白色而滑潤屬肺陽虛氣弱者補中益氣合參附湯主之補中益氣合參附湯方升麻五分柴胡五分酒炒人參錢半黃耆三錢炙白朮二錢半土炒歸身錢半陳皮一錢甘草一錢炙附子錢半制煨姜一錢大棗三枚按上方主治肺脾氣虛下陷而土冷金寒者其原治見前本方凡舌見白色乾燥而形色反見胖嫩者肺與大腸氣血兩虛也十全大補湯去肉桂加炮姜主之十全大補湯去肉桂加炮姜方川芎一錢歸身二錢白芍三錢酒炒熟地四錢人參錢半黃耆三錢炙白朮二錢半土炒茯苓錢半炮姜一錢炙草錢半大棗三枚按上方主治已見前參耆八珍湯條下凡舌見白色滑潤而形色又兼胖嫩者肺與大腸精氣虛寒也參附養榮湯去茯苓加炮姜主之參附養榮湯去茯苓加炮姜方白芍錢半酒炒遠志五分去心歸身一錢酒洗五味八分熟地二錢肉桂五分陳皮八分人參一錢白朮一錢炙草一錢炮姜一錢大棗三枚按上方主治並詳各臟腑病所列本方下凡舌見黑色而堅斂蒼老者腎與膀胱邪氣盛也清肝飲主之清肝飲方熟地八錢山藥二錢萸肉二錢丹皮錢半茯苓錢半澤瀉錢半柴胡一錢棗仁一錢歸身錢半白芍錢半甘草一錢按上方主治見前心與小腸病所列滋水清肝飲方下凡舌見黑色而浮胖嬌嫩者腎與膀胱精氣虛也補元煎主之補元煎方熟地六錢枸杞四錢山藥二錢萸肉二錢杜仲二錢人參二錢甘草二錢按上方主治男婦氣血俱虛精神失守危劇等症虛甚倍加耆術寒者重加薑附凡舌見黑色而乾燥屬膀胱陰虛火盛者六味飲合滋腎丸主之六味飲合滋腎丸方熟地四錢山藥二錢萸肉二錢茯苓錢半澤瀉錢半丹皮錢半黃柏二錢知母二錢肉桂五分按上方主治凡小便不利而莖中痛連小腹者系火逼膀胱所致也痛止便利即止勿服凡舌見黑色而乾燥屬腎陰虛火旺者六味飲合生脈散主之六味飲合生脈散方熟地四錢山藥二錢萸肉二錢丹皮錢半茯苓錢半澤瀉錢半五味錢半人參錢半麥冬錢半按上原方主治腎水不足虛火上升變為朝熱咳嗽消渴虛勞及水沸為痰等症易曰雨以潤之此方是也凡舌見黑色而滑潤屬膀胱陰盛火衰者金匱腎氣丸主之金匱腎氣丸方牛膝一兩車前子一兩附子五錢肉桂一兩熟地九兩酒拌山藥一兩萸肉一兩茯苓三兩澤瀉一兩丹皮一兩煉蜜為丸按本方主治脾腎虛寒腰重腳腫濕飲留積小便不利此則莖中痛而不連少腹者乃寒逼膀胱而氣不能化也或肚腹腫脹四肢浮腫氣喘痰盛或已成水症其效如神凡舌見黑色而滑潤屬右腎陽虛火虧者八味地黃丸主之八味地黃丸方附子一兩肉桂一兩熟地八兩山藥四兩萸肉四兩丹皮三兩茯苓三兩澤瀉三兩按上方主治命門火衰元陽虛憊變為泄瀉腹脹陽痿精寒不育兩膝痠疼腰軟無力兩目昏花不能遠視悉以此方治之易曰日以煊之此方是也凡舌見黑色乾燥而形色反見胖嫩者腎與膀胱陰陽俱虛也枸杞養榮湯主之繼用十補丸枸杞養榮湯方枸杞四錢遠志一錢歸身二錢五味錢半白芍三錢熟地六錢人參錢半白朮三錢炙草錢半茯苓錢半肉桂五分陳皮錢半炙耆三錢無參倍用煨姜錢半大棗五枚十補丸方熟地八兩山藥四兩萸肉四兩丹皮三兩茯苓三兩澤瀉三兩附子一兩制肉桂一兩鹿茸二兩無則鹿膠代之五味一兩蜜丸按上方主治腎臟虛冷面黑足寒耳聾膝軟小便不利等症凡舌見黑色滑潤而形色又兼胖嫩者腎與膀胱元氣大憊也附子養榮湯主之繼用右歸丸附子養榮湯方附子錢半遠志一錢白芍三錢酒炒歸身二錢五味錢半熟地六錢肉桂五分茯苓錢半人參錢半或二三錢炙耆五錢無參倍用白朮三錢陳皮錢半炙草錢半煨姜二錢大棗五枚上將熟地棗肉搗爛其餘炒磨為末加蜜為丸即豫家所制萬應一粒丹者是也凡中風傷寒痘疹胎産及血症喉痹等症勢在危急刻不可緩者每用一粒滾湯研化不時灌服其勢自定繼豫兩粒三粒其病自退如調治久病則作細丸每服五錢早晚兩時空心米飲送下按上方主治勞役過度飢飽失時思慮太甚鬱結尤多以致脾肺氣虛榮血不足畏寒發熱食少無味四肢無力懶動怠惰嗜臥身倦飢瘦色枯氣短驚悸怔忡健忘少寐或中風卒倒張口直視手撒遺尿或傷寒重劇譫妄昏沉撮空見鬼或身振脈搖或筋惕肉潤或吐血衄血便血不止或自汗盜汗頭汗不收或嘔吐泄瀉或水腫腹脹或眩暈厄逆或痰湧喘急或筋骨疼痛或手足痿痹或心腹腰背肋脅諸痛難當或九竅不利或瘧痢疾疾諸藥不效或脫肛痔漏積久不痊或夜熱咳嗽或夢遺白濁或婦女經閉血淋崩中帶下胎前産後或幼稚急驚慢脾疳積吐瀉麻疹痘瘡或發背癰疽不能起發收功或瘰癧流注不能消散潰斂種種雜症不拘新久但看其面色㿠白痿黃病勢日輕夜重而其舌胖嫩滑潤者勿論其脈症投以此方無不立應更有其舌由白而黃由黃而黑甚至焦乾燥裂而其舌頭浮大而胖壯者屬寒涼太過五臟虛冷也亦必此方救之余家救活各科危症夙號專門三吳遠近兩浙東西活人無算而起死回生之力此方十居六七蓋其用之廣而效之神誠有不能殫述者姑陳其略以為重生者告右歸丸方附子一兩肉桂一兩熟地八兩枸杞四兩山藥四兩萸肉四兩杜仲三兩歸身三兩菟絲三兩鹿膠三兩蜜丸按上方主治凡命門空虛等症八味丸治之不愈者此方神效見症已詳八味丸下驗舌配方結語方自仲景到今凡充棟矣而豫所經驗者採而輯之不過三十有奇不且嫌其太簡乎不知豫於醫也半世功夫搜盡群書主腦一生閲歷參遍各症根苗就標求本據本配方所配止此則其所輯亦惟此耳然經絡臟腑無病不統於其中通塞正從無法不備於其內則是方雖簡而未始不該也第天下之理則由一而分為萬吾輩之學須窮流以溯其源臨症者倘因有此而舉目則陰陽虛實了若日星動手則補瀉寒暄應如桴鼓遂相率而趨於簡易之途而不復於賾處著力繁處營心則闢後學一直捷之徑適貽後學以疏陋之譏亦非是編所以公世之心也
