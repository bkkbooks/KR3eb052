body:
  text: 上卷臨症以驗舌為準統論舌者心之苗也五臟六腑之大主其氣通於此其竅開於此者也查諸臟腑圖脾肺肝腎無不繫根於心核諸經絡考手足陰陽無脈不通於舌則知經絡臟腑之病不獨傷寒發熱有苔可驗即凡內外雜症亦無一不呈其形著其色於舌是以驗舌一法臨症者不可不講也何從前以醫名家者俱略焉而僅於傷寒見諸金鏡耶余自弱冠敬承家學殫心醫理間嘗從金鏡三十六舌逐一體驗其法殊多未合疑而質諸先君子先君子曰東莊不有云乎金鏡三十六舌當參其意而勿泥其法更有三十六舌之所未及者須以意通之豫領先君子訓退而繹其所以其意當參其法勿泥者乃見東莊所云真實獲我心也於是臨症之下於舌必看其形審其色合諸脈症而有心得其祕焉據舌以分虛實而虛實不爽焉據舌以分陰陽而陰陽不謬焉據舌以分臟腑配主方而臟腑不瘥主方不誤焉危急疑難之頃往往症無可參脈無可按而惟以舌為憑婦女幼稚之病往往聞之無息問之無聲而惟有舌可驗是以陰陽虛實見之悉得其真補瀉寒暄投之輒神其應人以見之無不真投之無不應也未有不稱以為奇者不知余於四診之中於舌更有獨得之祕也然獨得之祕究何祕哉不過同得之理耳臨症者誠潛心而有會焉則分之而臟腑各一陰陽也陰陽各一虛實也理周而法到可以補金鏡之所未及而正不止三十六舌也合之而臟腑同此陰陽也陰陽同此虛實也理圓而法活可以裁金鏡之所未合而並不必三十六舌也分而分之其法不出乎五行合而合之其理總原於太極準此以臨症則諸病之變現縱使萬葉千枝而一望之神明自可搜根拔本尚何無者生之有者甚之以干致邪失正絶人長命之咎哉茲將驗舌諸法備述之下惟識者參之驗舌分虛實法經云邪氣盛則實正氣奪則虛又云有餘者瀉之不足者補之竊謂虛實兩字是攪病機之領補瀉兩字是提治法之綱蓋以人之有病不出一虛一實醫之治病不過一補一瀉如虛實稍有疑心則補瀉無從下手其參症切脈以審虛實固臨症第一要著也乃有症似實而脈則虛脈似實而症則虛者如舍脈從症既難信以為真而舍從脈又惟恐其是假則且奈之何哉不知凡物之理實則其形堅斂其色蒼老虛則其體浮胖其色嬌嫩而病之現於舌也其形與色亦然故凡病屬實者其舌必堅斂而兼蒼老病屬虛者其舌必浮胖而兼嬌嫩如此分別則為虛為實是假是真雖未參症切脈而一目先了然矣驗舌分陰陽法虛實既分補瀉固有定見然虛實各有陰陽而陰陽迭為虛實則於虛實分陰陽臨症者又不可混也而分之不得其法則有以陰盛為陽盛陽虛為陰虛而不能無誤者且有症本陽虛而經訓曰陰虛令人錯解貽害不淺者如雲陰虛出盜汗陰言手太陰也虛言肺氣虛也又云陰虛發夜熱陰言足太陰也虛言脾氣虛也同曰陰虛而其中有手足太陰之分名曰陰虛而其實是脾肺氣虛之症無如歷代醫師從未注明其義誤以脾肺氣虛認為腎水不足而用滋陰降火之劑朝夕重陰下逼逼至土困金敗便溏聲嘶置之死地而不悟者只此兩個陰字拘義牽文以訛傳訛自古迄今普天之大不知日殺凡幾良可痛也況如此類者經中未易枚舉總緣陰陽混雜虛實模糊但憑脈症分晰難清耳詎知陰虛陽盛者其舌必乾陽虛陰盛者其舌必滑陰虛陽盛而火旺者其舌必乾而燥陽虛陰盛而火衰者其舌必滑而濕如此分別則為陰為陽誰實誰虛顯然可見更何似陰似陽之疑以致重陰重陽之誤貽人夭殃耶驗舌分臟腑配主方法虛實不爽而後補瀉無不應陰陽不謬而後寒暄無不投然必臟腑不瘥而後補瀉寒喧悉對其病以拔其根而主方無不諦則就虛實陰陽以分夫臟腑而定以主方臨症者尤不可混也而臟腑之分不越青黃黑白主方之配須合酸苦辛甘爰按內經分臟別腑並檢成方酌定主治條例如下一舌見青色肝膽病也紫色同不拘所見何症但看青而舌堅斂蒼老肝膽兩經邪氣盛也瀉火清肝飲青而浮胖嬌嫩者肝膽兩經精氣虛也滋水生肝飲青而乾燥者非膽腑陰虛火鬱即肝臟血虛火旺也但干而不燥者專責陰虛如干而且燥則陰虛而火旺矣各臟腑仿此膽腑陰虛者逍遙散火鬱加生地薄荷肝臟血虛者逍遙散火旺加丹皮山梔郁是氣抑抑則氣不透不透則熱而為火也第從來俱以鬱火屬之肝而余獨責之膽者蓋膽屬少陽其氣尚稚膽為甲木其質尚嫩所以最易被抑一抑則其氣悶而不舒矣若肝則為厥陰於木屬乙其氣已盛其質已堅而其火易動而易旺一有所觸則即發而不可遏其發而不可遏者怒也非郁也郁主凝滯於中而怒則發揚於外者也本方統治肝膽陰虛而於膽腑火鬱則加薄荷生地者以木喜風搖而鬱火非生地不能涼也於肝臟火旺則加丹皮山梔者蓋肝血既虛則肝火易旺則肝血益虛自非瀉其火難以滋其陰非借屈曲下行以通之無以瀉其火也惟是血為火迫變成燥症則當重加熟地以潤其燥丹山兩味固可不必而亦非宜矣青而滑潤者非膽腑氣怯即肝臟氣虛也膽腑氣怯者十味溫膽湯去枳實加酒煎服其應更捷蓋以酒入膽經而最壯膽氣也肝臟氣弱者當歸建中湯去膠飴建中之所以異於桂枝者在加膠飴一味耳今恐甘先入脾而去膠飴則仍與桂枝無別故用當歸建中則與肝臟氣虛乃合如干燥而形色反見胖嫩者肝膽陰陽兩虛也七味飲倍肉桂滑潤而形色不兼胖嫩者肝膽木氣虛寒也養榮湯加枸杞凡左關脈細緊如刀口者其舌不拘何色必胖而滑其病不拘何症心虛而寒豫每投以養榮無不立應臨症者切勿畏之重生者切勿疑之一舌見黃色脾胃病也不拘所見何症但看黃而堅斂蒼老者脾胃兩經邪氣盛也瀉黃散如有厚苔或焦黃或焦黑而糙刺燥裂其症痞滿燥實堅斂悉具者實症也須急下之以存津液大承氣湯主之但此是真正陽明裡症北方傷寒間或有此然舌若胖大即在北方亦非承氣的症切不可妄用硝黃殺人於頃刻也黃而浮胖嬌嫩者脾胃兩經精氣虛也益黃散黃而乾燥者非胃腑陰虧火旺即脾臟血虛火盛也胃腑陰虧者左歸飲去茯苓火旺加花粉歸地脾臟血虛者歸脾湯去木香火盛加白芍丹山如干燥而有厚苔者宿食滯於腸胃而燥結不出也其脈必牢實神思必昏沉面必擁熱通紅鼻必氣粗胸前按之必微痛須逍遙散倍加熟地潤而下之黃而滑潤者非胃氣虛弱即脾氣虧損也胃氣虛弱者七味白朮散加半夏脾氣虧損者五味異功散加白芍如其舌後半截滑膩而有微苔者乃脾胃虛氣下陷也須補中益氣湯如干燥而形色反見胖嫩者脾胃氣血兩虛也參耆八珍湯滑潤而形色又兼胖嫩者脾胃中氣虛寒也薑桂養榮湯一舌見赤色心與小腸病也不拘所見何症但看赤而堅斂蒼老者心與小腸邪氣盛也瀉心湯按四明心法凡舌見灰色指甲刮下無渣汁者方是火症乃芩連之對症也味其語意可見陽邪燔灼則其陰液未有不幹枯者然以豫驗之又必其形堅斂其色蒼老方是真正芩連對症若一見胖嫩即使苔厚而焦乾燥裂非寒水侮土即腎氣凌心寒水凌土當用附子理中腎氣凌心當用人參八味倘誤用芩連則舌上現出人字紋必死豫診莘墅沈彝仲症辭以不治者因其得此舌也有論驗在醫案中可參又按火色本紅火症而舌見灰色者如炭火通紅於內而浮灰翳蔽於外也顧據理論之則舌見灰色其症當更甚於舌黑如炭何也蓋火燃薪盡則是木成炭是草成灰故曰炭曰灰皆火極之變象也而木本質堅甫著火燃未成炭也必火極似水乃變黑而為炭然其性猶甚烈也至於久經火煅則熱極必寒乃返白而成灰然其心猶未灰也若草本則其體弱著火一過即灰矣一灰即不可復燃矣然則就物理以察病機彼見舌灰色者無論一火即灰與由炭而灰不皆更甚於舌黑如炭者乎赤而浮胖矯嫩者心與小腸精氣虛也養心湯赤而乾燥者非小腸陰虧火旺即心臟血虛火盛也小腸陰虧者滋水清肝飲去柴胡欲潤其下不欲其就燥也火旺加生地木通合導赤散以瀉其火氣心臟血虛者濟生歸脾湯去木香恐其血燥反動肝火而燥血液火盛加丹皮山梔凡本經之陰血既虧則本經之陽火必旺一負則一勝也加丹皮山梔者欲其引心火下行以直達於膀胱耳赤而滑潤者非小腸陽虛氣墜即心臟陽虛氣弱也小腸陽虛氣墜者補中益氣湯加山梔川烏氣虛則滯氣滯則墜方中參耆朮草補其虛也川烏陳皮破其滯也升麻柴胡舉其墜也加山梔借其屈曲下行以引至小腸耳心臟陽虛氣弱者噓血歸脾湯加丹皮肉桂氣有餘便是火氣不足便是寒本方加肉桂復加丹皮欲其引入心經以補心氣也如干燥而形色反見胖嫩者心與小腸氣血兩虛也棗仁養營湯滑潤而形色又見胖嫩者心與小腸火氣大虧也附子養營湯一舌見白色肺與大腸病也不拘所見何症但看白而堅斂蒼老者肺與大腸邪氣盛也瀉白散白而浮胖嬌嫩者肺與大腸精氣虛也補肺湯白而乾燥者非大腸血虛火盛即肺臟陰虛火盛也大腸血虛者潤腸滋水飲火盛加生地當歸凡大便燥結努力責不出者本方神應如兼氣虛而推送無力者間以補中或竟用八珍湯加桃仁杏仁養氣補陰亦無不應肺臟陰虛者生金滋水飲火燥加百合沙參白而滑潤者非大腸陽虛氣陷即肺臟陽虛氣弱也大腸陽虛氣陷者補中益氣湯送固腸散大腸小腸俱屬下焦之腑何以亦配中臟之方則以腸胃相連其氣本一貫也肺臟陽虛氣弱者補中益氣湯合參附湯如干燥而形色反見胖嫩者肺與大腸氣血兩虛也十全大補湯去肉桂加炮薑滑潤而形色又見兼胖嫩者肺與大腸金氣虛寒也參附養榮湯去茯苓加炮薑一舌見黑色腎與膀胱病也命門水火附左右兩腎同治不拘所見何症但看黑而堅斂蒼老者腎與膀胱邪氣盛也清肝飲黑而浮胖嬌嫩者腎與膀胱精神虛也補元煎黑而乾燥者非膀胱陰虛火盛即左腎陰虛火旺也膀胱陰虛者六味飲火盛合滋腎丸左腎陰虛者六味飲火旺合生脈散黑而滑潤者非膀胱陰盛火衰即右腎陽虛火虧也膀胱陰盛火衰者金匱腎氣丸膀胱為州都之官主藏津液而其所以能出者由氣化也陰虛火旺則熱逼膀胱而氣不能化矣陰盛火衰則寒逼膀胱而氣不能化矣膀胱不利為癃除脾肺氣虛不能通調水道外大率不出此兩者也然同一三陽癃閉而一由火旺一系火虧病判天淵治分冰炭相反若此可類推之右腎陽虛火虧者八味地黃丸如干燥而形色反見胖嫩者腎與膀胱陰陽俱虛也枸杞養榮湯主之繼用十全大補湯作丸更有由白而黃由黃而焦而枯黑燥裂其舌邊胖大舌底滑潤者甚有舌底亦燥而絶無津液其糙刺如沙皮斂束如荔子者皆因勞傷脾肺氣虛發熱誤用發散益虛益熱復用寒涼重陰內逼以致虛火上炎所以白上加黃黃上加焦而枯黑燥裂也不論其脈不論其症大劑參附養榮湯不時灌服多有得生者余救烏程潘中建之弟歸安張學海桐鄉諸聖濟等症皆此舌也有治驗在醫案可參滑潤而形色又兼氣嫩者腎與膀胱元氣大憊也附子養榮湯主之繼用右歸丸更有其舌同一黑色而一屬寒水侮土者宜用附子理中湯一系腎氣凌心者宜用人參八味其治有不相同何也蓋寒水侮土者系陰盛於內逼陽於外外假熱而內真寒格陽症也其黑色止聚於舌中腎氣凌心者系陰盛於下逼陽於上上假熱而下真寒戴陽症也其黑色直底於舌尖然未有不胖且嫩者乾燥滑潤又在所不拘也惟是實火兩症則其形必堅斂色必蒼老而萬無胖嫩者耳驗舌決生死法生死之決於脈症者內經垂訓甚明備矣而佐以驗舌則尤顯而易見也故並撮素所經驗者附載於此以為臨症一助一舌如去膜豬腰子者危一舌如鏡面者危一舌糙刺如沙皮而乾枯燥裂者危一舌斂束如荔子肉而絶無津液者危一舌如火柿者危一舌如烘糕者危一舌光無苔胃氣絶也不治一舌卷而囊縮者不治一舌本強直轉動不活而語言蹇澀者危一舌起白苔如雪花片者脾冷而閉也不治一舌因誤服芩連而現出人字紋者不治以上所列皆垂死危候也然有不必如此而死者有即至如此而灼見臟腑陰陽虛實竭力挽回則亦得生者吾輩果操活人神技須存壽世婆心即有百不一活之症當作萬有一生之想縱使修短有數彭殤難齊破格出奇終於莫救致招從旁浮議同道中傷病家歸咎然而反之吾心固無愧也倘畏避嫌疑而於此種危症再付之庸劣之手則必無生理矣詎不痛哉臨症以驗舌為準結語上論臨症以驗舌為準而驗舌以浮胖堅斂分虛實乾燥滑潤分陰陽黑白青黃分臟腑蓋本至中至正之理以立至簡至易之法軒岐復起當不易吾言也至於陰陽虛實四柱所配補瀉寒熱諸方雖是為臨症者舉其大略然而無一症不從親身經歷無一方不從親手試驗者誠以醫寄死生隻字不容率筆理原性命片語無可粗心也惟是加減出入因病制宜神明於規矩繩墨之中得心應手變化於規矩繩墨之外運斤成風則存乎其人耳而究之神明變化仍不離夫規矩繩墨也臨症者若知赤子元無罪合有人間父母心則余此一編也雖只望診中之一節乎亦未始非切脈審症之證據回生起死之範圍也倘出厥範圍而不憑此為證據則恐其所操以活人者反以殺人也已
